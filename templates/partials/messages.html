{% if messages %}
    <messages id="messages" class="fixed top-4 right-4 z-50 flex flex-col gap-3">
    {% for message in messages %}
        <div class="flex items-start gap-3 px-4 py-3 rounded-xl text-sm font-semibold {% if 'success' in message.tags %} bg-green-50 text-green-700 border border-green-200 {% elif 'error' in message.tags %} bg-red-50 text-red-700 border border-red-200 {% else %} bg-blue-50 text-blue-700 border border-blue-200 {% endif %}">
            <span class="text-lg flex-shrink-0">
                {% if 'success' in message.tags %}
                    ✅
                {% elif 'error' in message.tags %}
                    ❌
                {% else %}
                    ℹ️
                {% endif %}
            </span>
            <div>{{ message }}</div>
            <button onclick="this.parentElement.remove()" class="ml-auto text-gray-400 hover:text-gray-600 transition-all">
                ✖️  
            </button>
        </div>
    {% endfor %}
    </messages>

<script>
    setTimeout(() => {
        const messages = document.getElementById('messages');
        if (messages) {
            messages.remove();
        }
    }, 5000);
</script>
{% endif %}
