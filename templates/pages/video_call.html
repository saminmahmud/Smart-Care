<!DOCTYPE html>
<html>

<head>
    <title>Video Consultation</title>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        .top-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
        }

        .back-btn {
            display: inline-block;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            font-size: 14px;
            color: #475569;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        {% if request.user.role == 'doctor' %}
            <a class="back-btn" href="{% url 'doctor_appointments' %}" >
            ← Back
        </a>
        {% elif request.user.role == 'patient' %}
            <a class="back-btn" href="{% url 'my_appointments' %}" >
            ← Back
        </a>
        {% endif %}
    </div>

    <div id="root"></div>

</body>

<script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>

<script>

window.onload = function () {

    const roomID = "{{ room_id }}";

    const userID = "{{ request.user.id }}";

    const userName = "{{ request.user.get_full_name }}";

    const appID = {{ app_id }};

    const serverSecret = "f97ec4bc1616659b20c3d45723546be8";

    const kitToken = ZegoUIKitPrebuilt.generateKitTokenForTest(
        appID,
        serverSecret,
        roomID,
        userID,
        userName
    );

    const zp = ZegoUIKitPrebuilt.create(kitToken);

    zp.joinRoom({

        container: document.querySelector("#root"),

        sharedLinks: [
            {
                name: 'Consultation Link',
                url: window.location.href,
            },
        ],

        scenario: {
            mode: ZegoUIKitPrebuilt.VideoConference,
        },

        turnOnMicrophoneWhenJoining: true,
        turnOnCameraWhenJoining: true,

        showMyCameraToggleButton: true,
        showMyMicrophoneToggleButton: true,

        showAudioVideoSettingsButton: true,

        showScreenSharingButton: false,

        showTextChat: true,

        showUserList: true,

        maxUsers: 2,

        layout: "Auto",

        showLayoutButton: false,
    });

}

</script>

</html>
