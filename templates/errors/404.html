<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Care{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
        theme: { extend: { fontFamily: { serif: ['Playfair Display','serif'], sans: ['DM Sans','sans-serif'] } } }
        }
    </script>
</head>

<body class="min-h-[100vh] font-sans bg-slate-50">
<div class="block w-full">
    <div class="max-w-4xl mx-auto px-8 py-24 text-center">
        <h1 class="text-6xl">Page not found</h1>
        <p class="my-10 text-gray-500">
            Error 404: This page doesn't exist or is unavailable
        </p>
        <a href="{% url 'index' %}" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-900 transition-all">Go to Home</a>
    </div>
</div>
  
</body>
</html>
